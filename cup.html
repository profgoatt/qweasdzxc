<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find The Coin</title>
    <link rel="stylesheet" href="cup.css">
</head>
<body>

    <div class="container">
        <h1>🪙 Find The Coin</h1>
        <p id="message">Press Start to begin!</p>

        <button id="startBtn">Start Round</button>

        <div class="game-area">
            <div class="cup" data-index="0">
                <div class="coin"></div>
            </div>

            <div class="cup" data-index="1">
                <div class="coin"></div>
            </div>

            <div class="cup" data-index="2">
                <div class="coin"></div>
            </div>
        </div>

        <div class="score">
            Score: <span id="score">0</span>
        </div>
    </div>

    <script src="cup.js"></script>
</body>
</html>
